<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 5 - Community & City Life Vocabulary</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0284c7;
            --secondary: #0ea5e9;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1e1b4b;
            --light: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0284c7 0%, #7c3aed 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }

        header h1 {
            font-size: 3rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
        }

        .stat-card h3 {
            font-size: 2.5rem;
        }

        .stat-card p {
            opacity: 0.8;
        }

        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .filter-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: white;
            color: var(--primary);
            transform: translateY(-2px);
        }

        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .vocab-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .vocab-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
        }

        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .vocab-card .word {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .speak-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .speak-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
        }

        .speak-btn.speaking {
            animation: pulse 0.8s infinite;
            background: linear-gradient(135deg, #10b981, #34d399);
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        .vocab-card .meaning {
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 15px;
        }

        .vocab-card .phrase {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #334155;
            display: none;
        }

        .vocab-card.expanded .phrase {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .vocab-card .phrase strong {
            color: var(--primary);
            background: #bae6fd;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .phrase-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .phrase-header .speak-btn {
            width: 28px;
            height: 28px;
            font-size: 12px;
        }

        .phrase-label {
            font-weight: 600;
            color: var(--primary);
            font-size: 0.85rem;
        }

        .phrase-text {
            margin: 0;
        }

        .category-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .cat-urban {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .cat-behavior {
            background: #fce7f3;
            color: #db2777;
        }

        .cat-crime {
            background: #fee2e2;
            color: #dc2626;
        }

        .cat-community {
            background: #dcfce7;
            color: #16a34a;
        }

        .cat-social {
            background: #fef3c7;
            color: #d97706;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            max-width: 500px;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            font-family: inherit;
        }

        .search-box input:focus {
            outline: 3px solid var(--primary);
        }

        .progress-bar {
            width: 100%;
            max-width: 500px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            margin: 20px auto;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            border-radius: 10px;
            width: 0%;
            transition: width 0.5s ease;
        }

        .learned-count {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: white;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .vocab-grid {
                grid-template-columns: 1fr;
            }

            .stats {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🏙️ Unit 5: Community & City Life</h1>
            <p>Học từ vựng qua phương pháp cụm từ - Click vào thẻ để xem ví dụ</p>
        </header>
        <div class="stats">
            <div class="stat-card">
                <h3 id="totalWords">80</h3>
                <p>Tổng từ vựng</p>
            </div>
            <div class="stat-card">
                <h3>5</h3>
                <p>Nhóm chủ đề</p>
            </div>
            <div class="stat-card">
                <h3 id="learnedWords">0</h3>
                <p>Đã học</p>
            </div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="learned-count">Tiến độ: <span id="progressText">0%</span></p>
        <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Tìm kiếm từ vựng..."></div>
        <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all">Tất cả</button>
            <button class="filter-btn" data-filter="urban">Đô thị</button>
            <button class="filter-btn" data-filter="behavior">Hành vi</button>
            <button class="filter-btn" data-filter="crime">Tội phạm</button>
            <button class="filter-btn" data-filter="community">Cộng đồng</button>
            <button class="filter-btn" data-filter="social">Xã hội</button>
        </div>
        <div class="vocab-grid" id="vocabGrid"></div>
        <footer>
            <p>💡 Mẹo: Click vào thẻ để xem câu ví dụ, double-click để đánh dấu đã học</p>
        </footer>
    </div>

    <script>
        const vocabularyData = [
            // Nhóm 1: Đô thị & Khu vực
            { word: "Urban", meaning: "đô thị", phrase: "Many young people move to <strong>urban</strong> areas to find better jobs.", category: "urban" },
            { word: "Rural", meaning: "nông thôn", phrase: "Life in <strong>rural</strong> areas is quiet and close to nature.", category: "urban" },

            { word: "Residential", meaning: "khu dân cư", phrase: "This is a quiet <strong>residential</strong> area with no shops or restaurants.", category: "urban" },
            { word: "Commercial", meaning: "thương mại", phrase: "The <strong>commercial</strong> district has many offices and shopping centers.", category: "urban" },
            { word: "Industrial", meaning: "công nghiệp", phrase: "Factories are located in the <strong>industrial</strong> zone outside the city.", category: "urban" },
            { word: "Outskirts", meaning: "vùng rìa", phrase: "The new hospital was built on the <strong>outskirts</strong> of the city.", category: "urban" },
            { word: "Downtown", meaning: "trung tâm thành phố", phrase: "There are many restaurants and shops in <strong>downtown</strong> Saigon.", category: "urban" },
            { word: "Traffic", meaning: "giao thông", phrase: "The <strong>traffic</strong> in the city is terrible during rush hours.", category: "urban" },
            { word: "Parking", meaning: "đậu xe", phrase: "Finding <strong>parking</strong> in the city center is always a challenge.", category: "urban" },
            { word: "Public transportation", meaning: "phương tiện công cộng", phrase: "Taking <strong>public transportation</strong> is cheaper than driving a car.", category: "urban" },
            { word: "Amenities", meaning: "tiện ích", phrase: "This apartment has great <strong>amenities</strong> like a gym and a pool.", category: "urban" },
            { word: "Facilities", meaning: "cơ sở vật chất", phrase: "The school has modern <strong>facilities</strong> including a library and lab.", category: "urban" },
            { word: "Green space", meaning: "không gian xanh", phrase: "Cities need more <strong>green spaces</strong> like parks for people to relax.", category: "urban" },
            { word: "Noise", meaning: "tiếng ồn", phrase: "The <strong>noise</strong> from construction kept me awake all night.", category: "urban" },
            { word: "Crowded", meaning: "đông đúc", phrase: "The market is very <strong>crowded</strong> on weekends and holidays.", category: "urban" },

            { word: "Pet peeve", meaning: "điều gây khó chịu", phrase: "My biggest <strong>pet peeve</strong> is when people chew with their mouth open.", category: "behavior" },

            { word: "Litter", meaning: "xả rác", phrase: "Don't <strong>litter</strong> on the street; use the trash bins instead.", category: "behavior" },
            { word: "Spit", meaning: "khạc nhổ", phrase: "<strong>Spitting</strong> in public places is unhygienic and disrespectful.", category: "behavior" },

            { word: "Appropriate", meaning: "phù hợp", phrase: "Make sure your behavior is <strong>appropriate</strong> in a library.", category: "behavior" },
            { word: "Excusable", meaning: "có thể tha thứ", phrase: "Being late once is <strong>excusable</strong>, but not every day.", category: "behavior" },
            { word: "Rational", meaning: "hợp lý", phrase: "Let's find a <strong>rational</strong> solution instead of arguing.", category: "behavior" },
            { word: "Mature", meaning: "trưởng thành", phrase: "A <strong>mature</strong> person knows how to handle conflicts calmly.", category: "behavior" },
            { word: "Behavior", meaning: "hành vi", phrase: "Good <strong>behavior</strong> in public shows respect for other people.", category: "behavior" },
            { word: "Annoy", meaning: "làm khó chịu", phrase: "Loud chewing really <strong>annoys</strong> me during meals.", category: "behavior" },
            { word: "Bother", meaning: "làm phiền", phrase: "Sorry to <strong>bother</strong> you, but could you turn down the music?", category: "behavior" },

            // Nhóm 3: Tội phạm & An toàn
            { word: "Pickpocket", meaning: "móc túi", phrase: "Be careful of <strong>pickpockets</strong> in crowded markets.", category: "crime" },
            { word: "Burglar", meaning: "trộm đột nhập", phrase: "A <strong>burglar</strong> broke into the house while the family was away.", category: "crime" },
            { word: "Thief", meaning: "kẻ trộm", phrase: "The <strong>thief</strong> stole her wallet from her bag on the bus.", category: "crime" },
            { word: "Mugger", meaning: "cướp đường", phrase: "A <strong>mugger</strong> attacked a woman near the park at night.", category: "crime" },
            { word: "Vandal", meaning: "kẻ phá hoại", phrase: "<strong>Vandals</strong> sprayed graffiti on the walls of the school.", category: "crime" },
            { word: "Shoplifter", meaning: "trộm trong cửa hàng", phrase: "The security camera caught the <strong>shoplifter</strong> stealing a phone.", category: "crime" },
            { word: "Robbery", meaning: "cướp", phrase: "There was a <strong>robbery</strong> at the jewelry store last night.", category: "crime" },
            { word: "Theft", meaning: "trộm cắp", phrase: "Bicycle <strong>theft</strong> is very common in the city center.", category: "crime" },
            { word: "Break in", meaning: "đột nhập", phrase: "Someone tried to <strong>break in</strong> through the back door last night.", category: "crime" },
            { word: "Steal", meaning: "ăn cắp", phrase: "He was caught trying to <strong>steal</strong> food from the supermarket.", category: "crime" },

            { word: "Witness", meaning: "nhân chứng", phrase: "The <strong>witness</strong> told the police what she saw happen.", category: "crime" },
            { word: "Suspect", meaning: "nghi phạm", phrase: "The <strong>suspect</strong> was arrested near the scene of the crime.", category: "crime" },
            { word: "Crime rate", meaning: "tỉ lệ tội phạm", phrase: "The <strong>crime rate</strong> has decreased in our area this year.", category: "crime" },
            { word: "Danger", meaning: "nguy hiểm", phrase: "Walking alone at night can put you in <strong>danger</strong>.", category: "crime" },

            // Nhóm 4: Cộng đồng
            { word: "Community", meaning: "cộng đồng", phrase: "Our <strong>community</strong> organized a clean-up day at the park.", category: "community" },
            { word: "Neighbor", meaning: "hàng xóm", phrase: "My <strong>neighbor</strong> always helps me water my plants when I travel.", category: "community" },
            { word: "Help", meaning: "giúp đỡ", phrase: "We should <strong>help</strong> elderly people carry heavy bags.", category: "community" },
            { word: "Volunteer", meaning: "tình nguyện", phrase: "She <strong>volunteers</strong> at the orphanage every Saturday morning.", category: "community" },
            { word: "Participate", meaning: "tham gia", phrase: "Everyone should <strong>participate</strong> in community events.", category: "community" },
            { word: "Donate", meaning: "quyên góp", phrase: "They <strong>donated</strong> money to help families affected by the flood.", category: "community" },

            // Nhóm 5: Xã hội & Quan hệ
            { word: "Mind own business", meaning: "không xen vào việc người khác", phrase: "Sometimes it's better to <strong>mind your own business</strong>.", category: "social" },
            { word: "Get along", meaning: "hòa thuận", phrase: "I <strong>get along</strong> well with my roommates at the dorm.", category: "social" },
            { word: "Socialize", meaning: "giao lưu", phrase: "Joining clubs is a good way to <strong>socialize</strong> and make friends.", category: "social" },
            { word: "Interaction", meaning: "tương tác", phrase: "Friendly <strong>interaction</strong> with neighbors makes life more pleasant.", category: "social" },

            { word: "Responsibility", meaning: "trách nhiệm", phrase: "It is our <strong>responsibility</strong> to keep the city clean and safe.", category: "social" },
        ];

        const categoryLabels = {
            urban: { label: "Đô thị", class: "cat-urban" },
            behavior: { label: "Hành vi", class: "cat-behavior" },
            crime: { label: "Tội phạm", class: "cat-crime" },
            community: { label: "Cộng đồng", class: "cat-community" },
            social: { label: "Xã hội", class: "cat-social" }
        };

        let learnedWords = JSON.parse(localStorage.getItem('unit5Learned') || '[]');
        let currentFilter = 'all';

        function speakWord(word, button) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US'; utterance.rate = 0.85; utterance.pitch = 1;
            const voices = window.speechSynthesis.getVoices();
            const englishVoice = voices.find(v => v.lang.startsWith('en'));
            if (englishVoice) utterance.voice = englishVoice;
            button.classList.add('speaking');
            utterance.onend = () => button.classList.remove('speaking');
            utterance.onerror = () => button.classList.remove('speaking');
            window.speechSynthesis.speak(utterance);
        }

        function speakPhrase(phraseHtml, button) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = phraseHtml;
            const plainText = tempDiv.textContent || tempDiv.innerText;
            speakWord(plainText, button);
        }

        if (window.speechSynthesis.onvoiceschanged !== undefined) { window.speechSynthesis.onvoiceschanged = () => { }; }

        function renderCards(filter = 'all', search = '') {
            const grid = document.getElementById('vocabGrid');
            grid.innerHTML = '';
            let filteredData = vocabularyData;
            if (filter !== 'all') filteredData = filteredData.filter(v => v.category === filter);
            if (search) { const s = search.toLowerCase(); filteredData = filteredData.filter(v => v.word.toLowerCase().includes(s) || v.meaning.toLowerCase().includes(s)); }
            filteredData.forEach((vocab) => {
                const cat = categoryLabels[vocab.category];
                const isLearned = learnedWords.includes(vocab.word);
                const card = document.createElement('div');
                card.className = `vocab-card ${isLearned ? 'learned' : ''}`;
                card.style.opacity = isLearned ? '0.7' : '1';
                const phraseEscaped = vocab.phrase.replace(/'/g, "\\'");
                card.innerHTML = `
                    <span class="category-tag ${cat.class}">${cat.label}</span>
                    <div class="word">
                        <button class="speak-btn" onclick="event.stopPropagation(); speakWord('${vocab.word}', this)" title="Nghe phát âm từ">🔊</button>
                        <span>${isLearned ? '✅ ' : ''}${vocab.word}</span>
                    </div>
                    <div class="meaning">${vocab.meaning}</div>
                    <div class="phrase">
                        <div class="phrase-header">
                            <button class="speak-btn" onclick="event.stopPropagation(); speakPhrase('${phraseEscaped}', this)" title="Nghe câu ví dụ">🔊</button>
                            <span class="phrase-label">Ví dụ:</span>
                        </div>
                        <p class="phrase-text">${vocab.phrase}</p>
                    </div>
                `;
                card.addEventListener('click', () => card.classList.toggle('expanded'));
                card.addEventListener('dblclick', () => toggleLearned(vocab.word));
                grid.appendChild(card);
            });
            updateProgress();
        }

        function toggleLearned(word) {
            if (learnedWords.includes(word)) { learnedWords = learnedWords.filter(w => w !== word); }
            else { learnedWords.push(word); }
            localStorage.setItem('unit5Learned', JSON.stringify(learnedWords));
            renderCards(currentFilter, document.getElementById('searchInput').value);
        }

        function updateProgress() {
            const total = vocabularyData.length;
            const learned = learnedWords.length;
            const percent = Math.round((learned / total) * 100);
            document.getElementById('learnedWords').textContent = learned;
            document.getElementById('totalWords').textContent = total;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = percent + '%';
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderCards(currentFilter, document.getElementById('searchInput').value);
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => { renderCards(currentFilter, e.target.value); });
        renderCards();
    </script>
</body>

</html>
