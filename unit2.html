        }

            text-align: center;

        }

        }

        header p {
            font-size: 1.2rem;

        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
        }

        .stat-card h3 {
            font-size: 2.5rem;
        }

        .stat-card p {
            opacity: 0.8;
        }

        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .filter-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: white;
            color: var(--primary);
            transform: translateY(-2px);
        }

        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .vocab-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .vocab-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
        }

        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .vocab-card .word {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .speak-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .speak-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        .speak-btn.speaking {
            animation: pulse 0.8s infinite;
            background: linear-gradient(135deg, #10b981, #34d399);
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        .vocab-card .meaning {
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 15px;
        }

        .vocab-card .phrase {
            background: linear-gradient(135deg, #f5f3ff, #ede9fe);

            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #334155;
            display: none;

        }

        .vocab-card .phrase strong {
            color: var(--primary);
            background: #ddd6fe;
            padding: 2px 6px;
            border-radius: 4px;
        }

        }

            }

            justify-content: center;
            margin-bottom: 20px;
        }

            border-radius: 10px;

        function speakWord(word, button) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US'; utterance.rate = 0.85; utterance.pitch = 1;
            const voices = window.speechSynthesis.getVoices();
            const englishVoice = voices.find(v => v.lang.startsWith('en'));
            if (englishVoice) utterance.voice = englishVoice;
            button.classList.add('speaking');
            utterance.onend = () => button.classList.remove('speaking');
            utterance.onerror = () => button.classList.remove('speaking');
            window.speechSynthesis.speak(utterance);
        }

        function speakPhrase(phraseHtml, button) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = phraseHtml;
            const plainText = tempDiv.textContent || tempDiv.innerText;
            speakWord(plainText, button);
        }

        if (window.speechSynthesis.onvoiceschanged !== undefined) { window.speechSynthesis.onvoiceschanged = () => { }; }

        function renderCards(filter = 'all', search = '') {
            const grid = document.getElementById('vocabGrid');
            grid.innerHTML = '';
            let filteredData = vocabularyData;
            if (filter !== 'all') filteredData = filteredData.filter(v => v.category === filter);
            if (search) { const s = search.toLowerCase(); filteredData = filteredData.filter(v => v.word.toLowerCase().includes(s) || v.meaning.toLowerCase().includes(s)); }
            filteredData.forEach((vocab) => {
                const cat = categoryLabels[vocab.category];
                const isLearned = learnedWords.includes(vocab.word);
                const card = document.createElement('div');
                card.className = `vocab-card ${isLearned ? 'learned' : ''}`;
                card.style.opacity = isLearned ? '0.7' : '1';
                const phraseEscaped = vocab.phrase.replace(/'/g, "\\'");
                card.innerHTML = `
                    <span class="category-tag ${cat.class}">${cat.label}</span>
                    <div class="word">
                        <button class="speak-btn" onclick="event.stopPropagation(); speakWord('${vocab.word}', this)" title="Nghe phát âm từ">🔊</button>
                        <span>${isLearned ? '✅ ' : ''}${vocab.word}</span>
                    </div>
                    <div class="meaning">${vocab.meaning}</div>
                    <div class="phrase">
                        <div class="phrase-header">
                            <button class="speak-btn" onclick="event.stopPropagation(); speakPhrase('${phraseEscaped}', this)" title="Nghe câu ví dụ">🔊</button>
                            <span class="phrase-label">Ví dụ:</span>
                        </div>
                        <p class="phrase-text">${vocab.phrase}</p>
                    </div>
                `;
                card.addEventListener('click', () => card.classList.toggle('expanded'));
                card.addEventListener('dblclick', () => toggleLearned(vocab.word));
                grid.appendChild(card);
            });
            updateProgress();
        }

        function toggleLearned(word) {
            if (learnedWords.includes(word)) { learnedWords = learnedWords.filter(w => w !== word); }
            else { learnedWords.push(word); }
            localStorage.setItem('unit2Learned', JSON.stringify(learnedWords));
            renderCards(currentFilter, document.getElementById('searchInput').value);
        }

        function updateProgress() {
            const total = vocabularyData.length;
            const learned = learnedWords.length;
            const percent = Math.round((learned / total) * 100);
            document.getElementById('learnedWords').textContent = learned;
            document.getElementById('totalWords').textContent = total;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = percent + '%';
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderCards(currentFilter, document.getElementById('searchInput').value);
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => { renderCards(currentFilter, e.target.value); });
        renderCards();
    </script>
</body>

</html>
