<!DOCTYPE html>

    <style>
        :root {
            --primary: #059669;
            --secondary: #10b981;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1e1b4b;
            --light: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #059669 0%, #0d9488 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }

        header h1 {
            font-size: 3rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
        }

        .stat-card h3 {
            font-size: 2.5rem;
        }

        .stat-card p {
            opacity: 0.8;
        }

        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .filter-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: white;
            color: var(--primary);
            transform: translateY(-2px);
        }

        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .vocab-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .vocab-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
        }

        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .vocab-card .word {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .speak-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .speak-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 4px 15px rgba(5, 150, 105, 0.4);
        }

        .speak-btn.speaking {
            animation: pulse 0.8s infinite;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        .vocab-card .meaning {
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 15px;
        }

        .vocab-card .phrase {
            background: linear-gradient(135deg, #ecfdf5, #d1fae5);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #334155;
            display: none;
        }

        .vocab-card.expanded .phrase {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .vocab-card .phrase strong {
            color: var(--primary);
            background: #a7f3d0;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .phrase-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .phrase-header .speak-btn {
            width: 28px;
            height: 28px;
            font-size: 12px;
        }

        .phrase-label {
            font-weight: 600;
            color: var(--primary);
            font-size: 0.85rem;
        }

        .phrase-text {
            margin: 0;
        }

        .category-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .cat-shopping {
            background: #fce7f3;
            color: #db2777;
        }

        .cat-finance {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .cat-spending {
            background: #fef3c7;
            color: #d97706;
        }

        .cat-idioms {
            background: #ccfbf1;
            color: #0d9488;
        }

        .cat-credit {
            background: #e0e7ff;
            color: #4f46e5;
        }

        .cat-charity {
            background: #dcfce7;
            color: #16a34a;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            max-width: 500px;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            font-family: inherit;
        }

        .search-box input:focus {
            outline: 3px solid var(--primary);
        }

        .progress-bar {
            width: 100%;
            max-width: 500px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            margin: 20px auto;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            border-radius: 10px;
            width: 0%;
            transition: width 0.5s ease;
        }

        .learned-count {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: white;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .vocab-grid {
                grid-template-columns: 1fr;
            }

                align-items: center;
            }
        }
    </style>
</head>

        function speakWord(word, button) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US'; utterance.rate = 0.85; utterance.pitch = 1;
            const voices = window.speechSynthesis.getVoices();
            const englishVoice = voices.find(v => v.lang.startsWith('en'));
            if (englishVoice) utterance.voice = englishVoice;
            button.classList.add('speaking');
            utterance.onend = () => button.classList.remove('speaking');
            utterance.onerror = () => button.classList.remove('speaking');
            window.speechSynthesis.speak(utterance);
        }

        function speakPhrase(phraseHtml, button) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = phraseHtml;
            const plainText = tempDiv.textContent || tempDiv.innerText;
            speakWord(plainText, button);
        }

        if (window.speechSynthesis.onvoiceschanged !== undefined) { window.speechSynthesis.onvoiceschanged = () => { }; }

        function renderCards(filter = 'all', search = '') {
            const grid = document.getElementById('vocabGrid');
            grid.innerHTML = '';
            let filteredData = vocabularyData;
            if (filter !== 'all') filteredData = filteredData.filter(v => v.category === filter);
            if (search) { const s = search.toLowerCase(); filteredData = filteredData.filter(v => v.word.toLowerCase().includes(s) || v.meaning.toLowerCase().includes(s)); }
            filteredData.forEach((vocab) => {
                const cat = categoryLabels[vocab.category];
                const isLearned = learnedWords.includes(vocab.word);
                const card = document.createElement('div');
                card.className = `vocab-card ${isLearned ? 'learned' : ''}`;
                card.style.opacity = isLearned ? '0.7' : '1';
                const phraseEscaped = vocab.phrase.replace(/'/g, "\\'");
                card.innerHTML = `
                    <span class="category-tag ${cat.class}">${cat.label}</span>
                    <div class="word">
                        <button class="speak-btn" onclick="event.stopPropagation(); speakWord('${vocab.word}', this)" title="Nghe phát âm từ">🔊</button>
                        <span>${isLearned ? '✅ ' : ''}${vocab.word}</span>
                    </div>
                    <div class="meaning">${vocab.meaning}</div>
                    <div class="phrase">
                        <div class="phrase-header">
                            <button class="speak-btn" onclick="event.stopPropagation(); speakPhrase('${phraseEscaped}', this)" title="Nghe câu ví dụ">🔊</button>
                            <span class="phrase-label">Ví dụ:</span>
                        </div>
                        <p class="phrase-text">${vocab.phrase}</p>
                    </div>
                `;
                card.addEventListener('click', () => card.classList.toggle('expanded'));
                card.addEventListener('dblclick', () => toggleLearned(vocab.word));
                grid.appendChild(card);
            });
            updateProgress();
        }

        function toggleLearned(word) {
            if (learnedWords.includes(word)) { learnedWords = learnedWords.filter(w => w !== word); }
            else { learnedWords.push(word); }
            localStorage.setItem('unit3Learned', JSON.stringify(learnedWords));
            renderCards(currentFilter, document.getElementById('searchInput').value);
        }

        function updateProgress() {
            const total = vocabularyData.length;
            const learned = learnedWords.length;
            const percent = Math.round((learned / total) * 100);
            document.getElementById('learnedWords').textContent = learned;
            document.getElementById('totalWords').textContent = total;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = percent + '%';
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderCards(currentFilter, document.getElementById('searchInput').value);
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => { renderCards(currentFilter, e.target.value); });
        renderCards();
    </script>
</body>

</html>
